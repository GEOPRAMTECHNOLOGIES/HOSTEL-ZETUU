<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Hosteli Zetu</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  body { background: linear-gradient(160deg, var(--forest-dark), var(--forest)); min-height: 100vh; }
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-card { background: #fff; border-radius: var(--r-lg); padding: 40px; width: 100%; max-width: 420px; box-shadow: var(--shadow-lg); }
  .login-card .brand { justify-content: center; margin-bottom: 8px; color: var(--forest-dark); }
  .login-card p.sub { text-align: center; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand"><span class="mark">HZ</span>Hosteli Zetu</div>
    <p class="sub muted">Sign in to manage your hostel listings</p>
    <form id="loginForm">
      <div class="field"><label>Email</label><input type="email" id="email" required></div>
      <div class="field"><label>Password</label><input type="password" id="password" required></div>
      <p class="error-text" id="loginError" style="display:none;color:var(--danger);font-size:.84rem;margin-bottom:10px;"></p>
      <button class="btn btn-dark btn-block" type="submit" id="loginBtn">Sign in</button>
    </form>
    <p class="muted text-center" style="font-size:.78rem;margin-top:20px;">New hostel? <a href="/admin-register.html" style="color:var(--forest);font-weight:600;">Register your hostel →</a></p>
    <p class="muted text-center" style="font-size:.78rem;"><a href="/">← Back to Hosteli Zetu</a></p>
  </div>
</div>

<script src="/js/core.js"></script>
<script>
qs('#loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = qs('#loginBtn'); const errEl = qs('#loginError');
  errEl.style.display = 'none'; btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const res = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ email: qs('#email').value, password: qs('#password').value }) });
    localStorage.setItem('hz_admin_token', res.token);
    localStorage.setItem('hz_admin', JSON.stringify(res.admin));
    location.href = res.admin.role === 'super_admin' ? '/superadmin-dashboard.html' : '/admin-dashboard.html';
  } catch (err) {
    errEl.textContent = err.message; errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Sign in';
  }
});
</script>
</body>
</html>
