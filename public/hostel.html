<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hostel — Hosteli Zetu</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .gallery { display: grid; grid-template-columns: 2fr 1fr 1fr; grid-template-rows: repeat(2, 160px); gap: 8px; border-radius: var(--r-lg); overflow: hidden; }
  .gallery img { width: 100%; height: 100%; object-fit: cover; }
  .gallery .g0 { grid-row: span 2; }
  @media (max-width: 760px) { .gallery { grid-template-columns: 1fr 1fr; grid-template-rows: 130px 130px; } .gallery .g0 { grid-column: span 2; grid-row: 1; } .gallery a:nth-child(n+4) { display:none; } }

  .hostel-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin: 26px 0 18px; flex-wrap: wrap; }
  .amenity-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 10px; }
  .amenity-pill { background: var(--cream-dark); border-radius: var(--r-sm); padding: 10px 14px; font-size: .85rem; font-weight: 600; }

  .room-list { display: flex; flex-direction: column; gap: 14px; }
  .room-row { display: grid; grid-template-columns: 130px 1fr auto; gap: 16px; align-items: center; padding: 14px; border: 1px solid var(--line); border-radius: var(--r-md); background: #fff; }
  @media (max-width: 600px) { .room-row { grid-template-columns: 90px 1fr; } .room-row .rr-action { grid-column: span 2; } }
  .room-row .rr-thumb { width: 130px; height: 90px; border-radius: 10px; overflow: hidden; background: var(--cream-dark); }
  .room-row .rr-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .room-row h4 { margin: 0 0 4px; font-size: .98rem; }
  .room-row .price { font-family: var(--font-mono); font-weight: 700; color: var(--forest-dark); }

  .review-item { padding: 16px 0; border-bottom: 1px solid var(--line); }
  .review-item .stars { color: var(--gold); font-size: .85rem; }
  .sidebar-card { background: #fff; border: 1px solid var(--line); border-radius: var(--r-lg); padding: 20px; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="/" class="brand"><span class="mark">HZ</span><div>Hosteli Zetu<small>Your campus home, sorted</small></div></a>
    <div class="nav-links"><a href="/index.html#browse">Browse Hostels</a><a href="/track.html">Track Booking</a></div>
    <a href="/admin-login.html" class="btn btn-dark btn-sm">Admin Login</a>
  </div>
</nav>

<main class="container" style="padding-top:28px;padding-bottom:60px;" id="page">
  <div class="card skeleton" style="height:340px;margin-bottom:20px;"></div>
  <div class="card skeleton" style="height:120px;"></div>
</main>

<footer class="footer">
  <div class="container">
    <div class="bottom"><span>© <span id="yr"></span> Hosteli Zetu.</span><a href="/">Back to home</a></div>
  </div>
</footer>

<script src="/js/core.js"></script>
<script src="/js/hostel.js"></script>
</body>
</html>
